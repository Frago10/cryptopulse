# =============================================================================
# CI - lint + tests para CryptoPulse
# Corre en cada push a main y en cada pull request.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          ruff check . --exclude dbt_project/dbt_packages

      - name: Run unit tests (skip integration)
        env:
          # Variables minimas para que pydantic-settings no truene en CI
          POSTGRES_HOST: localhost
          POSTGRES_PASSWORD: ci_dummy
        run: |
          pytest -v -m "not integration"
